<svg xmlns="http://www.w3.org/2000/svg" width="1472" height="2058" viewBox="0 0 1472 2058" role="img" aria-label="句法双引擎透视仪页面概览">
  <rect width="1472" height="2058" fill="#ffffff"/>
  <rect y="0" width="1472" height="5" fill="#ff4b4b"/>
  <text x="70" y="138" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="40" font-weight="700" fill="#374151">句法双引擎透视仪与“歧义侦探”</text>
  <text x="70" y="180" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#6b7280">同一句话，切换成分句法与依存句法两种视角，观察模型如何做出结构决策。</text>

  <text x="70" y="225" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">请输入英文句子</text>
  <rect x="70" y="239" width="1284" height="34" rx="7" fill="#f1f3f6"/>
  <text x="88" y="262" font-family="Arial, sans-serif" font-size="14" fill="#1f2937">The boy saw the man with the telescope.</text>

  <rect x="70" y="293" width="1284" height="44" rx="7" fill="#ffffff" stroke="#d1d5db"/>
  <text x="90" y="321" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">当前模型状态</text>
  <path d="M1322 310 l9 9 l9 -9" fill="none" stroke="#6b7280" stroke-width="2"/>

  <text x="70" y="382" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">依存关系</text>
  <text x="140" y="382" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#ef4444">成分结构</text>
  <line x1="70" y1="398" x2="1354" y2="398" stroke="#e5e7eb"/>
  <line x1="140" y1="398" x2="200" y2="398" stroke="#ef4444" stroke-width="3"/>

  <text x="70" y="452" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#374151">成分句法树</text>
  <text x="70" y="500" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">观察短语如何层层嵌套，特别留意</text>
  <text x="398" y="500" font-family="Menlo, Consolas, monospace" font-size="16" fill="#16a34a">with the telescope</text>
  <text x="570" y="500" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">最终并入了哪一层短语。</text>

  <rect x="78" y="535" width="1270" height="314" rx="10" fill="#ffffff" stroke="#d1d5db"/>
  <g font-family="Times New Roman, serif" fill="#111827" stroke="#111827" stroke-width="1.2">
    <text x="253" y="570" font-size="18">TOP</text>
    <line x1="272" y1="580" x2="272" y2="610"/>
    <text x="266" y="632" font-size="18">S</text>
    <line x1="268" y1="640" x2="137" y2="674"/>
    <line x1="276" y1="640" x2="458" y2="674"/>
    <line x1="281" y1="640" x2="439" y2="626"/>
    <text x="123" y="694" font-size="18">NP</text>
    <text x="447" y="694" font-size="18">VP</text>
    <line x1="134" y1="704" x2="110" y2="738"/>
    <line x1="140" y1="704" x2="149" y2="738"/>
    <line x1="458" y1="704" x2="392" y2="738"/>
    <line x1="466" y1="704" x2="522" y2="738"/>
    <line x1="492" y1="704" x2="610" y2="738"/>
    <text x="103" y="758" font-size="18">DT</text>
    <text x="140" y="758" font-size="18">NN</text>
    <text x="381" y="758" font-size="18">VBD</text>
    <text x="504" y="758" font-size="18">NP</text>
    <text x="600" y="758" font-size="18">PP</text>
    <line x1="112" y1="766" x2="112" y2="795"/>
    <line x1="150" y1="766" x2="150" y2="795"/>
    <line x1="396" y1="766" x2="396" y2="795"/>
    <line x1="512" y1="766" x2="466" y2="795"/>
    <line x1="520" y1="766" x2="543" y2="795"/>
    <line x1="609" y1="766" x2="594" y2="795"/>
    <line x1="619" y1="766" x2="685" y2="795"/>
    <text x="98" y="817" font-size="18">The</text>
    <text x="136" y="817" font-size="18">boy</text>
    <text x="382" y="817" font-size="18">saw</text>
    <text x="452" y="817" font-size="18">DT</text>
    <text x="536" y="817" font-size="18">NN</text>
    <text x="585" y="817" font-size="18">IN</text>
    <text x="676" y="817" font-size="18">NP</text>
    <line x1="463" y1="825" x2="463" y2="854"/>
    <line x1="546" y1="825" x2="546" y2="854"/>
    <line x1="592" y1="825" x2="592" y2="854"/>
    <line x1="686" y1="825" x2="650" y2="854"/>
    <line x1="692" y1="825" x2="755" y2="854"/>
    <text x="452" y="876" font-size="18">the</text>
    <text x="532" y="876" font-size="18">man</text>
    <text x="574" y="876" font-size="18">with</text>
    <text x="640" y="876" font-size="18">DT</text>
    <text x="744" y="876" font-size="18">NN</text>
    <line x1="651" y1="884" x2="651" y2="913"/>
    <line x1="754" y1="884" x2="754" y2="913"/>
    <text x="637" y="935" font-size="18">the</text>
    <text x="718" y="935" font-size="18">telescope</text>
  </g>

  <rect x="70" y="1016" width="1284" height="126" rx="8" fill="#f7f8fa"/>
  <text x="90" y="1045" font-family="Menlo, Consolas, monospace" font-size="15" fill="#111827">(TOP</text>
  <text x="90" y="1070" font-family="Menlo, Consolas, monospace" font-size="15" fill="#111827">  (S</text>
  <text x="90" y="1095" font-family="Menlo, Consolas, monospace" font-size="15" fill="#111827">    (NP (DT The) (NN boy))</text>
  <text x="90" y="1120" font-family="Menlo, Consolas, monospace" font-size="15" fill="#111827">    (VP (VBD saw) (NP (DT the) (NN man)) (PP (IN with) (NP (DT the) (NN telescope))))</text>

  <line x1="70" y1="1190" x2="1354" y2="1190" stroke="#d1d5db"/>
  <text x="70" y="1254" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#374151">核心论元提取器</text>
  <text x="70" y="1302" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">根据依存分析结果，抽取主语</text>
  <text x="330" y="1302" font-family="Menlo, Consolas, monospace" font-size="16" fill="#16a34a">nsubj</text>
  <text x="386" y="1302" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">、直接宾语</text>
  <text x="486" y="1302" font-family="Menlo, Consolas, monospace" font-size="16" fill="#16a34a">dobj</text>
  <text x="531" y="1302" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">、介词宾语</text>
  <text x="632" y="1302" font-family="Menlo, Consolas, monospace" font-size="16" fill="#16a34a">pobj</text>
  <text x="678" y="1302" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">与根节点</text>
  <text x="760" y="1302" font-family="Menlo, Consolas, monospace" font-size="16" fill="#16a34a">ROOT</text>
  <text x="805" y="1302" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">。</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">
    <rect x="70" y="1324" width="470" height="174" fill="#ffffff" stroke="#d1d5db"/>
    <line x1="70" y1="1360" x2="540" y2="1360" stroke="#d1d5db"/>
    <line x1="70" y1="1395" x2="540" y2="1395" stroke="#e5e7eb"/>
    <line x1="70" y1="1430" x2="540" y2="1430" stroke="#e5e7eb"/>
    <line x1="70" y1="1465" x2="540" y2="1465" stroke="#e5e7eb"/>
    <line x1="140" y1="1324" x2="140" y2="1498" stroke="#e5e7eb"/>
    <line x1="210" y1="1324" x2="210" y2="1498" stroke="#e5e7eb"/>
    <line x1="292" y1="1324" x2="292" y2="1498" stroke="#e5e7eb"/>
    <line x1="360" y1="1324" x2="360" y2="1498" stroke="#e5e7eb"/>
    <text x="86" y="1347" font-weight="700">依存关系</text><text x="156" y="1347" font-weight="700">词</text><text x="226" y="1347" font-weight="700">词性</text><text x="308" y="1347" font-weight="700">中心词</text><text x="376" y="1347" font-weight="700">说明</text>
    <text x="86" y="1384">nsubj</text><text x="156" y="1384">boy</text><text x="226" y="1384">NOUN</text><text x="308" y="1384">saw</text><text x="376" y="1384">名词性主语</text>
    <text x="86" y="1419">ROOT</text><text x="156" y="1419">saw</text><text x="226" y="1419">VERB</text><text x="308" y="1419">-</text><text x="376" y="1419">句子核心谓词</text>
    <text x="86" y="1454">dobj</text><text x="156" y="1454">man</text><text x="226" y="1454">NOUN</text><text x="308" y="1454">saw</text><text x="376" y="1454">直接宾语</text>
    <text x="86" y="1489">pobj</text><text x="156" y="1489">telescope</text><text x="226" y="1489">NOUN</text><text x="308" y="1489">with</text><text x="376" y="1489">介词宾语</text>
  </g>

  <text x="70" y="1550" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="32" font-weight="700" fill="#374151">逐词分析表</text>
  <text x="70" y="1598" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="17" fill="#374151">这个表对完成 “Fruit flies like a banana.” 的歧义观察尤其有帮助。</text>

  <g font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">
