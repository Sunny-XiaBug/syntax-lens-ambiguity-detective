    <line x1="70" y1="1928" x2="462" y2="1928" stroke="#e5e7eb"/>
    <line x1="145" y1="1620" x2="145" y2="1964" stroke="#e5e7eb"/>
    <line x1="219" y1="1620" x2="219" y2="1964" stroke="#e5e7eb"/>
    <line x1="306" y1="1620" x2="306" y2="1964" stroke="#e5e7eb"/>
    <line x1="384" y1="1620" x2="384" y2="1964" stroke="#e5e7eb"/>
    <text x="86" y="1644" font-weight="700">词</text><text x="160" y="1644" font-weight="700">词性</text><text x="233" y="1644" font-weight="700">词形还原</text><text x="318" y="1644" font-weight="700">依存关系</text><text x="398" y="1644" font-weight="700">中心词</text>
    <text x="86" y="1678">The</text><text x="160" y="1678">DET</text><text x="233" y="1678">the</text><text x="318" y="1678">det</text><text x="398" y="1678">boy</text>
    <text x="86" y="1712">boy</text><text x="160" y="1712">NOUN</text><text x="233" y="1712">boy</text><text x="318" y="1712">nsubj</text><text x="398" y="1712">saw</text>
    <text x="86" y="1746">saw</text><text x="160" y="1746">VERB</text><text x="233" y="1746">see</text><text x="318" y="1746">ROOT</text><text x="398" y="1746">-</text>
    <text x="86" y="1780">the</text><text x="160" y="1780">DET</text><text x="233" y="1780">the</text><text x="318" y="1780">det</text><text x="398" y="1780">man</text>
    <text x="86" y="1814">man</text><text x="160" y="1814">NOUN</text><text x="233" y="1814">man</text><text x="318" y="1814">dobj</text><text x="398" y="1814">saw</text>
    <text x="86" y="1848">with</text><text x="160" y="1848">ADP</text><text x="233" y="1848">with</text><text x="318" y="1848">prep</text><text x="398" y="1848">man</text>
    <text x="86" y="1882">the</text><text x="160" y="1882">DET</text><text x="233" y="1882">the</text><text x="318" y="1882">det</text><text x="398" y="1882">telescope</text>
    <text x="86" y="1916">telescope</text><text x="160" y="1916">NOUN</text><text x="233" y="1916">telescope</text><text x="318" y="1916">pobj</text><text x="398" y="1916">with</text>
  </g>

  <rect x="70" y="1995" width="1284" height="50" rx="8" fill="#e8f3ff"/>
  <text x="90" y="2026" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" font-weight="700" fill="#2563eb">分析建议：</text>
  <text x="198" y="2026" font-family="Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="16" fill="#1e40af">先输入默认句子观察介词短语附着，再输入 “Fruit flies like a banana.” 查看 flies 被标成名词还是动词。</text>
</svg>
